{% extends 'base.html' %}
{% block content %}
<div class="card" style="max-width: 450px; margin: 4rem auto;">
    <h2 style="text-align: center; margin-bottom: 2rem;">Acesso Administrativo</h2>
    <form method="POST" action="{{ url_for('login') }}">
        <div class="form-group">
            <label for="email">E-mail</label>
            <input type="email" id="email" name="email" class="form-control" required placeholder="admin@admin.com">
        </div>
        <div class="form-group">
            <label for="password">Senha</label>
            <input type="password" id="password" name="password" class="form-control" required placeholder="••••••••">
        </div>
        <button type="submit" class="btn" style="width: 100%; margin-top: 1rem;">Entrar no Sistema</button>
    </form>
</div>
{% endblock %}
